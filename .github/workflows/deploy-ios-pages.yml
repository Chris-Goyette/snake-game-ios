name: Deploy iOS Game to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - "ios/**"
      - ".github/workflows/deploy-ios-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload iOS static files
        uses: actions/upload-pages-artifact@v3
        with:
          path: ios

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
